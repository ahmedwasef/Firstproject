<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Math Blast</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <!-- MENU -->
  <div id="screen-menu">
    <h1>Math Blast 🚀</h1>
    <p class="subtitle">Tap the correct answer to destroy the asteroid!</p>
    <div class="difficulty-buttons">
      <button class="btn-diff easy"   data-diff="easy">Easy<br><small>Ages 5–7 · Addition</small></button>
      <button class="btn-diff medium" data-diff="medium">Medium<br><small>Ages 8–10 · Add &amp; Subtract</small></button>
      <button class="btn-diff hard"   data-diff="hard">Hard<br><small>Ages 11–12 · × and ÷</small></button>
    </div>
    <p id="menu-highscore">Best Score: 0</p>
  </div>

  <!-- HUD -->
  <div id="screen-hud" class="hidden">
    <span id="hud-score">Score: 0</span>
    <span id="hud-level">Level 1</span>
    <div id="hud-lives">♥ ♥ ♥</div>
  </div>

  <!-- ANSWER CHOICES PANEL -->
  <div id="choices-panel" class="hidden">
    <button class="choice-btn" data-idx="0"></button>
    <button class="choice-btn" data-idx="1"></button>
    <button class="choice-btn" data-idx="2"></button>
    <button class="choice-btn" data-idx="3"></button>
  </div>

  <!-- GAME OVER -->
  <div id="screen-gameover" class="hidden">
    <h2>Game Over</h2>
    <p id="final-score"></p>
    <p id="new-record" class="hidden">🏆 New High Score!</p>
    <button id="btn-replay">Play Again</button>
    <button id="btn-menu">Change Difficulty</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
